<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ses Proje | AI Haber Radyosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Header Tasarımı */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .tagline {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Haber Kartları */
        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border-color: var(--primary);
        }

        .news-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: block;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Ses Oynatıcı Özelleştirme */
        .audio-wrapper {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
        }

        audio {
            width: 100%;
            height: 36px;
        }

        /* Loading & Error Mesajları */
        #loading, #error-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            h1 { font-size: 24px; }
            .news-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo-icon">🎙️</div>
            <h1>Ses Proje</h1>
        </div>
        <p class="tagline">Yapay zeka tarafından hazırlanan günlük teknoloji özetleri.</p>
    </header>

    <main id="news-container">
        <div id="loading">Haberler yükleniyor...</div>
    </main>

    <footer class="footer">
        &copy; 2024 Ses Proje AI Radyo. Tüm hakları saklıdır.
    </footer>
</div>

<script>
    async function fetchNews() {
        const container = document.getElementById('news-container');
        try {
            // Cache kırması için timestamp ekliyoruz
            const response = await fetch('news.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('Haberler alınamadı');
            
            const news = await response.json();
            container.innerHTML = '';

            if (news.length === 0) {
                container.innerHTML = '<div id="loading">Henüz yeni haber yok.</div>';
                return;
            }

            news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                
                // Tarih formatlama
                const date = new Date(item.timestamp);
                const formattedDate = date.toLocaleDateString('tr-TR', { 
                    day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' 
                });

                card.innerHTML = `
                    <span class="news-date">${formattedDate}</span>
                    <h2>${item.title}</h2>
                    <div class="audio-wrapper">
                        <audio controls>
                            <source src="${item.url}" type="audio/mpeg">
                            Tarayıcınız ses öğesini desteklemiyor.
                        </audio>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Hata:', error);
            container.innerHTML = `
                <div id="error-msg">
                    <p>Haberlere ulaşılamadı. Lütfen sonra tekrar deneyin.</p>
                </div>
            `;
        }
    }

    fetchNews();
</script>

</body>
</html>
