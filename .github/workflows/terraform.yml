name: "Infrastructure and App Deployment"

on:
  push:
    branches:
      - main

jobs:
  terraform-and-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 1. Terraform ile Altyapıyı ve ECR'ı Kur
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          #terraform_version: "1.7.0"
          terraform_wrapper: false
      
      - name: Terraform Init & Apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve

      - name: Get UI Bucket Name
        id: get_bucket
        run: |
          # Terraform output'tan bucket ismini al ve GitHub ortam değişkenine yaz
          BUCKET_NAME=$(terraform output -raw ui_bucket_name)
          echo "UI_BUCKET=$BUCKET_NAME" >> $GITHUB_ENV
        working-directory: ./infra

      - name: Sync UI to S3
        run: |
          # ui klasöründeki her şeyi S3'e yükle (sync sadece değişenleri atar)
          aws s3 sync ./ui s3://${{ env.UI_BUCKET }} --delete

      # 2. AWS ECR'a Login Ol
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 3. Docker İmajını Build Et ve ECR'a Gönder
      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: audio-news-generator
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG